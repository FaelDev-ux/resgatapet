<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResgataPets - Nova Denúncia</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.jpg" alt="ResgataPets logo" />
      <span style="color: #2d6a4f" class="logo-text">Resgata<span style="color: #ff7043">Pets</span></span>
    </a>
    <nav class="nav">
        <div class="wrap-username">
          <p class="username">Olá,  </p>
          <p class="nav-link logout-btn"> Sair </p>
        </div>
        <div class="wrap-links">
          <a href="index.html" class="nav-link"> Início </a>
          <a href="report.html" class="nav-link active"> Nova Denúncia </a>
          <a href="dashboard.html" class="nav-link"> Painel </a>
          <a href="faq.html" class="nav-link"> FAQ </a>
          <a href="sobre.html" class="nav-link"> Sobre </a>
        </div>
      </nav>

      <nav class="nav-mobile">
        <p class="username">Olá, </p>

        <div class="menu-mobile home">
          <i class="fa-solid fa-house"></i>
          <a class="">Início</a>
        </div><!--home-->

        <div class="menu-mobile mobile-active report">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <a class="">Denunciar</a>
        </div><!--report-->
        
        <div class="menu-mobile dashboard">
          <i class="fa-solid fa-table-columns"></i>
          <a class="">Painel</a>
        </div><!--dashboard-->

        <div class="menu-mobile faq">
          <i class="fa-solid fa-circle-question"></i>
          <a class="">FAQ</a>
        </div><!--faq-->

        <div class="menu-mobile about">
          <i class="fa-solid fa-circle-info"></i>
          <a class="">Sobre</a>
        </div><!--about-->
        
      </nav>
  </header>

  <main class="main main-form">
    <section class="form-section">
      <h2 class="section-title">Registrar Denúncia</h2>
      <form id="report-form" class="report-form">
        <div class="form-grid-container">
          
      <div class="form-column-left">
        <div class="form-group">
          <label for="type">Tipo de Denúncia</label>
          <select name="type" id="type" required>
            <option value="">Selecione o tipo</option>
            <option value="animal_perdido">Animal Perdido</option>
            <option value="animal_abandonado">Animal Abandonado</option>
            <option value="animal_ferido">Animal Ferido</option>
            <option value="maus_tratos">Maus Tratos</option>
            <option value="outros">Outros</option>
          </select>
        </div>
        <div class="form-group">
          <label for="description">Descrição da Denúncia</label>
          <textarea name="description" id="description" rows="10" required placeholder="Descreva a denúncia ou o animal perdido."></textarea>
        </div>
        <div class="form-group">
          <label for="image">Imagem</label>
          <input type="file" name="image" id="image" accept="image/*">
        </div>
      </div>

      <div class="form-column-right">
        <div class="form-group">
          <label>Localização</label>
          <p class="map-hint"> Clique no mapa para selecionar o local</p>
          <div id="map-report" class="map-container map-container--report"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="latitude">Latitude</label>
              <input type="text" id="latitude" name="latitude" required placeholder="Ex: -23.2342">
            </div>
            <div class="form-group">
              <label for="longitude">Longitude</label>
              <input type="text" id="longitude" name="longitude" required placeholder="Ex: -46.2342">
            </div>
          </div>
          <div class="form-group">
            <button class="btn btn-secondary" id="btn-geolocation" type="button">Usar Localização Atual</button>
            <span id="geolocation-status" class="geolocation-status" aria-live="polite"></span>
          </div>
        </div>
        </div>
      </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Enviar Denúncia</button>
        </div>
      </form>
    </section>
  </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="js/reports.js"></script>
    <script src="js/map.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
